<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yt-dl</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  font-family: 'Inter', -apple-system, 'SF Pro Display', system-ui, sans-serif;
  background: transparent;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}
.toast {
  width: 400px;
  background: #1b1b1b;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,.35);
  border: 1px solid rgba(255,255,255,.06);
  display: flex;
  overflow: hidden;
  animation: slideIn 200ms ease-out forwards;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}
.accent { width:4px; flex-shrink:0; border-radius:4px 0 0 4px; }
.thumb-wrap { width:120px; height:68px; flex-shrink:0; margin:10px; border-radius:8px; overflow:hidden; align-self:center; }
.thumb-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.content { flex:1; min-width:0; padding:10px 10px 10px 0; display:flex; flex-direction:column; justify-content:center; gap:1px; }
.app { font-size:12px; font-weight:600; color:#888; letter-spacing:.02em; line-height:1.3; }
.title { font-size:13px; font-weight:600; color:#fff; line-height:1.3; }
.video-title { font-size:13px; font-weight:400; color:#bbb; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.meta-row { display:flex; align-items:center; gap:6px; margin-top:3px; }
.meta { font-size:11px; color:#777; }
.badge { font-size:10px; display:inline-flex; align-items:center; justify-content:center; border-radius:50%; width:14px; height:14px; font-weight:700; vertical-align:middle; margin-left:4px; }
.badge-green { background:#2ecc71; color:#1b1b1b; }
.retry { font-size:12px; font-weight:600; color:#3ea6ff; cursor:pointer; background:none; border:none; padding:0; margin-left:auto; line-height:1; }
.retry:hover { color:#6abfff; }
.v-started .accent { background:#3ea6ff; }
.v-completed .accent { background:#2ecc71; }
.v-failed .accent { background:#f39c12; }
</style>
</head>
<body>
<div class="toast" id="toast">
  <div class="accent" id="accent"></div>
  <div class="thumb-wrap"><img id="thumb" src=""></div>
  <div class="content">
    <div class="app" id="app">yt-dl</div>
    <div class="title" id="title"></div>
    <div class="video-title" id="videoTitle"></div>
    <div class="meta-row">
      <span class="meta" id="meta"></span>
      <button class="retry" id="retryBtn" style="display:none" onclick="doRetry()">Retry</button>
    </div>
  </div>
</div>
<script src="notification.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
:root { --bg: #0a0a0a; --card: #141414; --text: #e5e5e5; --text-secondary: #888; --accent: #ff2d20; --border: #2a2a2a; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 320px; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 16px; }
h1 { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 16px; }
.quality-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.quality-btn { padding: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; text-align: center; }
.quality-btn:hover, .quality-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.status { font-size: 12px; color: var(--text-secondary); text-align: center; padding: 12px; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
</style>
</head>
<body>
<h1>yt-dl</h1>
<div class="quality-grid">
<button class="quality-btn" data-q="144p">144p</button>
<button class="quality-btn" data-q="240p">240p</button>
<button class="quality-btn" data-q="360p">360p</button>
<button class="quality-btn" data-q="480p">480p</button>
<button class="quality-btn" data-q="720p">720p</button>
<button class="quality-btn" data-q="1080p">1080p</button>
<button class="quality-btn" data-q="1440p">1440p</button>
<button class="quality-btn" data-q="2160p">2160p</button>
<button class="quality-btn" data-q="audio">Audio</button>
</div>
<div class="status" id="status">Click a quality to set default</div>
<script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
:root { --bg: #0a0a0a; --card: #141414; --text: #e5e5e5; --text-secondary: #888; --accent: #ff2d20; --border: #2a2a2a; --green: #22c55e; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 320px; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 16px; }
h1 { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
.section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; margin-top: 12px; }
.quality-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
.quality-btn { padding: 6px 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; text-align: center; }
.quality-btn:hover, .quality-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.download-btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
.download-btn:hover { opacity: 0.9; }
.download-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.status { font-size: 12px; color: var(--text-secondary); text-align: center; padding: 10px; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
.status.success { border-color: var(--green); color: var(--green); }
.status.error { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<h1>yt-dl</h1>
<button class="download-btn" id="download-page">⬇ Download this page</button>
<div class="section-title">Default quality</div>
<div class="quality-grid">
<button class="quality-btn" data-q="144p">144p</button>
<button class="quality-btn" data-q="240p">240p</button>
<button class="quality-btn" data-q="360p">360p</button>
<button class="quality-btn" data-q="480p">480p</button>
<button class="quality-btn" data-q="720p">720p</button>
<button class="quality-btn" data-q="1080p">1080p</button>
<button class="quality-btn" data-q="1440p">1440p</button>
<button class="quality-btn" data-q="2160p">2160p</button>
<button class="quality-btn" data-q="audio">Audio</button>
</div>
<div class="status" id="status">Ready</div>
<script src="popup.js"></script>
</body>
</html>

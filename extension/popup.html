<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
:root {
  --bg: #0e0e0e;
  --surface: #1a1a1a;
  --surface-hover: #252525;
  --text: #ffffff;
  --text-secondary: #a1a1aa;
  --label: #7f7f7f;
  --accent: #ff2d20;
  --accent-dim: rgba(255,45,32,0.08);
  --success: #22c55e;
  --divider: rgba(255,255,255,0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 320px;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  font-smooth: antialiased;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
}

.container { padding: 14px 16px 16px; }

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon-wrap {
  width: 38px;
  height: 38px;
  flex-shrink: 0;
  border-radius: 10px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.icon-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
  pointer-events: none;
}

.icon-wrap svg { width: 18px; height: 18px; }

.title-area { flex: 1; min-width: 0; }

.title-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.title {
  font-weight: 700;
  font-size: 16px;
  color: var(--text);
  letter-spacing: -0.01em;
}

.badge {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-secondary);
  background: var(--surface);
  padding: 1px 6px;
  border-radius: 4px;
  letter-spacing: 0.02em;
  line-height: 1.4;
}

.status-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 1px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-dot.online {
  background: var(--success);
  box-shadow: 0 0 6px rgba(34,197,94,0.4);
}

.status-dot.offline {
  background: var(--accent);
  box-shadow: 0 0 6px rgba(255,45,32,0.4);
}

.status-text {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
}

/* Divider */
.divider {
  height: 1px;
  background: var(--divider);
  margin: 12px 0;
}

/* Label */
.label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--label);
  margin-bottom: 10px;
}

/* Quality Grid */
.quality-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.quality-btn {
  height: 48px;
  background: var(--surface);
  color: #d4d4d4;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  text-align: center;
  transition: background 120ms ease, box-shadow 120ms ease, color 120ms ease, transform 120ms ease;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  position: relative;
}

.quality-btn:active {
  transform: scale(0.96);
}

.quality-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.quality-btn:hover {
  background: var(--surface-hover);
}

.quality-btn.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 6px 20px rgba(255,45,32,0.3);
}

.quality-btn.active::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%);
  pointer-events: none;
}

/* Audio Row */
.audio-row {
  display: flex;
  justify-content: center;
  margin-top: 8px;
}

.quality-btn.audio-btn {
  width: 100%;
  max-width: 140px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon-wrap">
      <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="10" width="16" height="11" rx="2"/>
        <path d="M12 3v12"/>
        <path d="M8 11l4 4 4-4"/>
      </svg>
    </div>
    <div class="title-area">
      <div class="title-row">
        <span class="title">yt-dl</span>
        <span class="badge">v1.0</span>
      </div>
      <div class="status-row">
        <span class="status-dot online" id="statusDot"></span>
        <span class="status-text" id="statusText">Connecting...</span>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="label">Default Quality</div>

  <div class="quality-grid">
    <button class="quality-btn" data-q="144p">144p</button>
    <button class="quality-btn" data-q="240p">240p</button>
    <button class="quality-btn" data-q="360p">360p</button>
    <button class="quality-btn" data-q="480p">480p</button>
    <button class="quality-btn" data-q="720p">720p</button>
    <button class="quality-btn" data-q="1080p">1080p</button>
    <button class="quality-btn" data-q="1440p">1440p</button>
    <button class="quality-btn" data-q="2160p">2160p</button>
  </div>

  <div class="audio-row">
    <button class="quality-btn audio-btn" data-q="audio">Audio</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>

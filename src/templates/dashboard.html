{% extends "base.html" %}
{% block title %}Queue - yt-dl{% endblock %}

<div id="sections"></div>
<div style="text-align:center; padding:20px;">

</div>
<footer class="page-footer" id="page-footer">

</footer>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
{% endblock %}
